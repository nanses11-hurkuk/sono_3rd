			function multiSubCallBack(data, oSelectId) {
				var rcvInfo = document.getElementById("rcvInfo_*");
				var subIncludeDesc = jsonRcvAreaMessages["APP-000242"];
				
				rcvInfo.innerHTML="";
				var spanHtml = new Array();
				for (var i=0; i<data.length; i++) {

					}
					if($orgVal.idType == 'USER'){
						dataName = dataName + " [" + $orgVal.deptName+"]";
					}
					spanHtml.push(dataName);
				}
				//var ulHtml = "<ul>";
				var ulHtml = "";
				for(var i = 0; i < spanHtml.length; i++){
					ulHtml += "<li style=\"display: inline-block; margin-right: 10px; margin-bottom: 5px; list-style: none;\">";

				rcvInfo.innerHTML += ulHtml;
				//rcvInfo.innerHTML += "&nbsp;"+spanHtml.join(" , ");
